<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee X — AI Admin Assistant</title>
  <style>
    :root {
      --color-bg: #F8FAFC;
      --color-bg-card: #FFFFFF;
      --color-bg-hover: #F1F5F9;
      --color-bg-input: #F1F5F9;
      --color-sidebar: #F0F4F8;
      --color-border: #E2E8F0;
      --color-border-light: #CBD5E1;
      --color-text: #0F172A;
      --color-text-muted: #475569;
      --color-text-dim: #94A3B8;
      --color-border-faint: rgba(148, 163, 184, 0.1);
      --color-scrollbar-thumb: #CBD5E1;
      --color-scrollbar-hover: #94A3B8;
    }
    [data-theme="dark"] {
      --color-bg: #060A12;
      --color-bg-card: #0B1120;
      --color-bg-hover: #111827;
      --color-bg-input: #0F172A;
      --color-sidebar: #080D18;
      --color-border: #1E293B;
      --color-border-light: #334155;
      --color-text: #E2E8F0;
      --color-text-muted: #94A3B8;
      --color-text-dim: #64748B;
      --color-border-faint: rgba(30, 41, 59, 0.4);
      --color-scrollbar-thumb: #1E293B;
      --color-scrollbar-hover: #334155;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--color-bg); overflow: hidden; color: var(--color-text); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-scrollbar-thumb); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-scrollbar-hover); }
    :focus-visible { outline: 2px solid #0EA5E9; outline-offset: 2px; }
    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 2px solid #0EA5E9; outline-offset: 2px; }
    #skip-to-content { position: absolute; left: -9999px; z-index: 999; padding: 8px 16px; background: #0EA5E9; color: #fff; font-size: 13px; font-weight: 700; border-radius: 0 0 8px 0; text-decoration: none; }
    #skip-to-content:focus { left: 0; top: 0; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    /* Auto-detect RTL/LTR per-element for mixed Arabic/English content */
    #main-content div, #main-content span, #main-content p, #main-content li,
    #main-content td, #main-content th { unicode-bidi: plaintext; }
  </style>
</head>
<body>
  <a href="#main-content" id="skip-to-content">Skip to content</a>
  <div id="root"></div>
  <script>
    // Apply saved theme before React renders to avoid flash
    var t = localStorage.getItem('employeex-theme');
    if (t === 'dark') document.documentElement.dataset.theme = 'dark';
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
