<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee X — AI Admin Assistant</title>
  <style>
    :root {
      --color-bg: #F8FAFC;
      --color-bg-card: rgba(255,255,255,0.65);
      --color-bg-hover: rgba(241,245,249,0.7);
      --color-bg-input: rgba(241,245,249,0.6);
      --color-sidebar: rgba(240,244,248,0.72);
      --color-border: rgba(226,232,240,0.6);
      --color-border-light: rgba(203,213,225,0.5);
      --color-text: #0F172A;
      --color-text-muted: #475569;
      --color-text-dim: #94A3B8;
      --color-border-faint: rgba(148, 163, 184, 0.1);
      --color-scrollbar-thumb: #CBD5E1;
      --color-scrollbar-hover: #94A3B8;
      --glass-blur: 20px;
      --glass-border: 1px solid rgba(255,255,255,0.25);
      --glass-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --glass-shadow-elevated: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      --glass-inset-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
      --modal-backdrop: rgba(0,0,0,0.4);
    }
    [data-theme="dark"] {
      --color-bg: #060A12;
      --color-bg-card: rgba(11,17,32,0.6);
      --color-bg-hover: rgba(17,24,39,0.6);
      --color-bg-input: rgba(15,23,42,0.5);
      --color-sidebar: rgba(8,13,24,0.7);
      --color-border: rgba(30,41,59,0.5);
      --color-border-light: rgba(51,65,85,0.4);
      --color-text: #E2E8F0;
      --color-text-muted: #94A3B8;
      --color-text-dim: #64748B;
      --color-border-faint: rgba(30, 41, 59, 0.4);
      --color-scrollbar-thumb: #1E293B;
      --color-scrollbar-hover: #334155;
      --glass-blur: 20px;
      --glass-border: 1px solid rgba(255,255,255,0.08);
      --glass-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 1px 2px rgba(0,0,0,0.15);
      --glass-shadow-elevated: 0 8px 40px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
      --glass-inset-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      --modal-backdrop: rgba(0,0,0,0.55);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--color-bg); overflow: hidden; color: var(--color-text); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-scrollbar-thumb); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-scrollbar-hover); }
    #root { position: relative; }
    #root::before {
      content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 10% 20%, rgba(14,165,233,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(139,92,246,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 50% 90%, rgba(245,158,11,0.04) 0%, transparent 70%);
    }
    @supports not (backdrop-filter: blur(1px)) {
      :root { --color-bg-card: rgba(255,255,255,0.92); --color-sidebar: rgba(240,244,248,0.92); }
      [data-theme="dark"] { --color-bg-card: rgba(11,17,32,0.92); --color-sidebar: rgba(8,13,24,0.92); }
    }
    :focus-visible { outline: 2px solid #0EA5E9; outline-offset: 2px; }
    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 2px solid #0EA5E9; outline-offset: 2px; }
    #skip-to-content { position: absolute; left: -9999px; z-index: 999; padding: 8px 16px; background: #0EA5E9; color: #fff; font-size: 13px; font-weight: 700; border-radius: 0 0 8px 0; text-decoration: none; }
    #skip-to-content:focus { left: 0; top: 0; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    /* Auto-detect RTL/LTR per-element for mixed Arabic/English content */
    #main-content div, #main-content span, #main-content p, #main-content li,
    #main-content td, #main-content th { unicode-bidi: plaintext; }
  </style>
</head>
<body>
  <a href="#main-content" id="skip-to-content">Skip to content</a>
  <div id="root"></div>
  <script>
    // Apply saved theme before React renders to avoid flash
    var t = localStorage.getItem('employeex-theme');
    if (t === 'dark') document.documentElement.dataset.theme = 'dark';
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
